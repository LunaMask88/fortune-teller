<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#060412"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- 光晕 -->
  <circle cx="256" cy="220" r="160" fill="url(#glow)"/>
  <!-- 水晶球 -->
  <circle cx="256" cy="220" r="110" fill="none" stroke="#d4af37" stroke-width="3" opacity="0.8"/>
  <circle cx="256" cy="220" r="105" fill="rgba(167,139,250,0.15)"/>
  <circle cx="220" cy="185" r="28" fill="rgba(255,255,255,0.12)"/>
  <!-- 星点 -->
  <circle cx="256" cy="130" r="4" fill="#d4af37" opacity="0.9"/>
  <circle cx="310" cy="160" r="3" fill="#d4af37" opacity="0.7"/>
  <circle cx="200" cy="170" r="2.5" fill="#a78bfa" opacity="0.8"/>
  <circle cx="330" cy="220" r="2" fill="#d4af37" opacity="0.6"/>
  <circle cx="180" cy="230" r="2" fill="#a78bfa" opacity="0.6"/>
  <!-- 底座 -->
  <ellipse cx="256" cy="345" rx="70" ry="14" fill="rgba(212,175,55,0.3)"/>
  <rect x="236" y="325" width="40" height="28" rx="4" fill="rgba(212,175,55,0.2)" stroke="#d4af37" stroke-width="1.5" opacity="0.7"/>
  <!-- 文字 M -->
  <text x="256" y="238" text-anchor="middle" dominant-baseline="middle"
    font-family="Georgia, serif" font-size="72" font-weight="bold"
    fill="#d4af37" opacity="0.95">M</text>
  <!-- 品牌名 -->
  <text x="256" y="400" text-anchor="middle" dominant-baseline="middle"
    font-family="Georgia, serif" font-size="30" letter-spacing="4"
    fill="#d4af37" opacity="0.85">MYSTIC</text>
</svg>
